# Publishes Storybook to Chromatic (updates the “live” link in the app + README).
# Requires repo secret: CHROMATIC_PROJECT_TOKEN (Chromatic → Project → Manage → Configure)
name: Chromatic

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  chromatic:
    name: Publish Storybook to Chromatic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          zip: true
          autoAcceptChanges: main
          exitZeroOnChanges: true
