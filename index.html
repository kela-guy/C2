      <!--
        Fonts load here in <head> rather than via a CSS @import. A CSS
        @import forces a serial waterfall (HTML → CSS bundle → googleapis
        stylesheet → woff2). The preconnect pair warms the TLS handshake to
        both Google origins, and the stylesheet <link> is discovered by the
        preload scanner immediately, in parallel with the app bundle.
      -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      />
